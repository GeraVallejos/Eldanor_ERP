name: Auto Merge Dev to Main

# Dispara cuando el workflow CI completa en la rama dev.
# Usa merge directo via REST API, sin necesitar la opcion
# "Allow auto-merge" en Settings del repositorio.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge dev PR when CI passes
    # Solo actuar si CI paso en dev
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Merge open dev->main PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;

              // Buscar PR abierto dev -> main
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                base: 'main',
                head: `${owner}:dev`,
                per_page: 1,
              });

              let pr = prs[0];

              // Si no existe PR, lo creamos automaticamente.
              if (!pr) {
                core.info('No hay PR abierto dev->main. Creando PR automatico...');
                try {
                  const { data: createdPr } = await github.rest.pulls.create({
                    owner,
                    repo,
                    title: 'chore: sync dev into main',
                    head: 'dev',
                    base: 'main',
                    body: [
                      'PR auto-generado por workflow.',
                      '',
                      '- origen: dev',
                      '- destino: main',
                      '- accion: merge automatico cuando CI este en verde',
                    ].join('\n'),
                    draft: false,
                  });
                  pr = createdPr;
                  core.info(`PR creado: #${pr.number}.`);
                } catch (createError) {
                  const msg = String(createError?.message || createError);
                  if (msg.includes('No commits between') || msg.includes('A pull request already exists')) {
                    core.info(`No se requiere crear PR nuevo: ${msg}`);
                    return;
                  }
                  core.warning(`No se pudo crear PR dev->main: ${msg}`);
                  return;
                }
              }

              if (pr.draft) {
                core.info(`PR #${pr.number} esta en draft. Se omite merge automatico.`);
                return;
              }

              core.info(`Mergeando PR #${pr.number}...`);

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                  commit_title: `chore: merge dev into main (#${pr.number})`,
                });
                core.info(`PR #${pr.number} mergeado exitosamente.`);
              } catch (error) {
                // Merge con conflictos o PR ya cerrado: solo advierte.
                core.warning(`No se pudo mergear PR #${pr.number}: ${error.message}`);
              }
            } catch (fatal) {
              core.warning(`Error inesperado en auto-merge: ${fatal.message}`);
            }
