name: Auto Merge Dev to Main

# Dispara cuando el workflow CI completa en la rama dev.
# Usa merge directo via REST API, sin necesitar la opcion
# "Allow auto-merge" en Settings del repositorio.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge dev PR when CI passes
    # Solo actuar si CI paso en dev
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Merge open dev->main PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            try {
              const owner = context.repo.owner;
              const repo = context.repo.repo;

              // Buscar PR abierto dev -> main
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                base: 'main',
                head: `${owner}:dev`,
                per_page: 1,
              });

              if (!prs[0]) {
                core.info('No hay PR abierto dev->main. Nada que mergear.');
                return;
              }

              const pr = prs[0];

              if (pr.draft) {
                core.info(`PR #${pr.number} esta en draft. Se omite merge automatico.`);
                return;
              }

              core.info(`Mergeando PR #${pr.number}...`);

              let mergeSha = null;
              try {
                const { data: mergeResult } = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                  commit_title: `chore: merge dev into main (#${pr.number})`,
                });
                mergeSha = mergeResult.sha;
                core.info(`PR #${pr.number} mergeado exitosamente (${mergeSha.slice(0,7)}).`);
              } catch (error) {
                core.warning(`No se pudo mergear PR #${pr.number}: ${error.message}`);
                return;
              }

              // Fast-forward dev al mismo commit de main para evitar el "behind 1".
              // Es seguro: el merge commit de main tiene a dev como padre directo.
              try {
                await github.rest.git.updateRef({
                  owner,
                  repo,
                  ref: 'heads/dev',
                  sha: mergeSha,
                  force: false,
                });
                core.info(`dev sincronizado con main (fast-forward a ${mergeSha.slice(0,7)}).`);
              } catch (syncError) {
                core.warning(`No se pudo sincronizar dev con main: ${syncError.message}`);
              }
            } catch (fatal) {
              core.warning(`Error inesperado en auto-merge: ${fatal.message}`);
            }
