name: Auto Merge Dev to Main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'dev' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge for dev PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            // Envuelto en try global: este workflow nunca debe bloquear un PR.
            try {
              const pr = context.payload.pull_request;

              // Consultamos estado actual; si GitHub aun lo calcula devuelve 'unknown'.
              let mergeableState = 'unknown';
              try {
                const { data: prData } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                mergeableState = String(prData.mergeable_state || 'unknown').toLowerCase();
              } catch (e) {
                core.warning(`No se pudo consultar estado del PR #${pr.number}: ${e.message}`);
              }

              // 'behind' es normal despues de un merge; dejamos que GitHub lo resuelva.
              if (['dirty', 'blocked', 'draft'].includes(mergeableState)) {
                core.warning(
                  `Auto-merge no habilitado para PR #${pr.number}: estado actual ${mergeableState}.`,
                );
                return;
              }

              try {
                await github.graphql(
                  `mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId,
                      mergeMethod: MERGE
                    }) {
                      pullRequest {
                        number
                      }
                    }
                  }`,
                  { pullRequestId: pr.node_id }
                );
                core.info(`Auto-merge habilitado para PR #${pr.number}.`);
              } catch (error) {
                // Cualquier error de la mutacion GraphQL solo advierte, no bloquea.
                core.warning(`No se pudo habilitar auto-merge para PR #${pr.number}: ${error.message}`);
              }
            } catch (fatal) {
              // Captura de seguridad: ningun error puede fallar este job.
              core.warning(`Error inesperado en auto-merge workflow: ${fatal.message}`);
            }
