name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: Eldanor_ERP.settings_ci
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Django system check
        run: python manage.py check

      - name: Check missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Validate permission action map
        run: python scripts/check_permission_action_map.py

      - name: Run backend tests with coverage
        run: pytest --cov=apps --cov-report=term

  frontend-tests:
    name: Frontend Lint and Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test:run